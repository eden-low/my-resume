<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Low Fang Jun — Portfolio | EdenAtlas</title>
  <!-- Compatibility route only (EdenAtlas v3.6 "Portfolio to root"): the Portfolio markup itself
       now lives at index.html — this page never duplicates it, it just forwards old bookmarks/
       shared links there. `?redirect=0` here is out of scope; there is nothing to guard against a
       loop with, since index.html never redirects anywhere. -->
  <meta name="robots" content="noindex, follow" />
  <link rel="canonical" href="https://edenatlas.netlify.app/index.html" />
  <meta http-equiv="refresh" content="0; url=index.html" />
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#09090e">
  <script>try{if(JSON.parse(localStorage.getItem('lfj:settings')||'{}').theme==='light')document.querySelector('meta[name="theme-color"]').setAttribute('content','#f5f5f7');}catch(e){}</script>
  <link rel="apple-touch-icon" href="images/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="images/icon-192.png">
  <style>
    body { background: #0a0a0e; color: #9793ab; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 0 24px; margin: 0; }
    a { color: #a78bfa; }
  </style>
  <script>
    // JS path (runs before the 0s meta-refresh in practice on every real browser): preserves any
    // query string and hash so an old deep link like `portfolio.html#work` or
    // `portfolio.html?utm=...` lands on the exact same spot on the new root page.
    // location.replace() (not location.href) so this redirect never adds its own history entry —
    // pressing Back from index.html goes to wherever the user was *before* the old bookmark,
    // not back into a redirect loop through this page.
    (function () {
      var target = "index.html" + location.search + location.hash;
      location.replace(target);
    })();
  </script>
</head>
<body>
  <!-- No-JS fallback: the meta-refresh above already forwards after 0s for these visitors too,
       this is the visible content for the brief instant before that happens (or for any browser/
       crawler that respects neither). -->
  <p style="font-size:14px;text-align:center;">
    Redirecting to <a href="index.html">the EdenAtlas Portfolio</a>&hellip;
  </p>
</body>
</html>
