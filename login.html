<!DOCTYPE html>
<html lang="en">
<head>
  <script>(function(){try{var s=JSON.parse(localStorage.getItem('lfj:settings')||'{}');if(s.theme==='light')document.documentElement.setAttribute('data-theme','light');}catch(e){}})();</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In | EdenAtlas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#09090e">
  <link rel="apple-touch-icon" href="images/icon-192.png">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            darkBg: '#0a0a0e',
            cardBg: '#17151f',
            borderNeon: '#2a2833',
            neonPurple: '#a78bfa',
            neonBlue: '#6ea8fe',
            neonViolet: '#8b7cf0',
            textGray: '#9793ab',
          },
          fontFamily: {
            cyber: ['-apple-system', 'BlinkMacSystemFont', '"SF Pro Display"', '"Segoe UI"', 'sans-serif'],
            code: ['ui-monospace', '"SF Mono"', 'Menlo', 'Consolas', '"Fira Code"', 'monospace'],
            sans: ['-apple-system', 'BlinkMacSystemFont', '"SF Pro Text"', '"Segoe UI"', 'Roboto', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>
<body class="auth-check-pending bg-darkBg text-white font-sans grid-bg min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-sm reveal bg-cardBg/90 backdrop-blur-md neon-border-purple rounded-2xl p-8 text-center">
    <div class="w-14 h-14 mx-auto rounded-xl bg-gradient-to-tr from-neonViolet to-neonPurple flex items-center justify-center shadow-lg shadow-neonPurple/20">
      <i class="fa-solid fa-circle-user text-white text-xl"></i>
    </div>
    <h1 class="font-cyber font-semibold text-xl mt-5 text-transparent bg-clip-text bg-gradient-to-r from-white to-neonPurple">EdenAtlas</h1>
    <p class="text-[10px] text-neonPurple font-code font-bold tracking-widest mt-1">DIGITAL ATLAS</p>
    <p class="text-textGray text-sm mt-5">Sign in with Google to continue.</p>

    <button id="signin-btn" class="mt-6 w-full px-5 py-3 bg-gradient-to-r from-neonViolet to-neonPurple rounded-xl text-sm font-cyber font-bold tracking-wider text-white hover:scale-[1.02] transition-all flex items-center justify-center gap-2">
      <i class="fa-brands fa-google"></i> SIGN IN WITH GOOGLE
    </button>
    <p id="standalone-note" class="hidden mt-4 text-xs text-textGray leading-relaxed">
      Google sign-in doesn't reliably complete inside the installed app on iPhone. Tap below to sign in using Safari, then reopen this app from your Home Screen — it'll remember you.
    </p>
    <a id="signin-safari-link" href="#" target="_blank" rel="noopener" class="hidden mt-4 w-full px-5 py-3 bg-gradient-to-r from-neonViolet to-neonPurple rounded-xl text-sm font-cyber font-bold tracking-wider text-white hover:scale-[1.02] transition-all items-center justify-center gap-2">
      <i class="fa-solid fa-arrow-up-right-from-square"></i> OPEN IN SAFARI TO SIGN IN
    </a>
    <p id="signin-status" class="mt-4 text-xs font-code text-textGray"></p>
  </div>

  <script type="module" src="js/i18n.js"></script>
  <footer class="max-w-7xl mx-auto px-4 mt-10 pb-6 text-center">
    <p class="text-[11px] font-code text-textGray/70">EdenAtlas &middot; by Jun &middot; Version 2.5</p>
  </footer>

  <script src="scripts.js" defer></script>
  <script type="module">
    import { auth, googleProvider, db, isOwner, USER_MODE_KEY } from "./firebase-init.js";
    import { onAuthStateChanged, signInWithPopup } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import { addDoc, collection, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const signinBtn = document.getElementById("signin-btn");
    const statusEl = document.getElementById("signin-status");
    const standaloneNote = document.getElementById("standalone-note");
    const safariLink = document.getElementById("signin-safari-link");

    function shortDevice(ua) {
      if (!ua) return "an unknown device";
      if (/iPhone|iPad/.test(ua)) return "iOS";
      if (/Android/.test(ua)) return "Android";
      if (/Windows/.test(ua)) return "Windows";
      if (/Macintosh/.test(ua)) return "macOS";
      if (/Linux/.test(ua)) return "Linux";
      return "an unknown device";
    }

    // A standalone/installed iPhone PWA cannot reliably complete Google sign-in from inside
    // its own window — tried both signInWithPopup (no usable opener link back from the popup)
    // and signInWithRedirect (the pending-redirect marker Firebase stores client-side doesn't
    // survive the round trip through Google's origin in this context), and both silently strand
    // the user on Google's page with no way back. The only flow that reliably works is doing the
    // OAuth dance in a real Safari tab (target="_blank" forces iOS to hand off to Safari even
    // from a standalone window) and letting the installed app pick up the persisted session
    // (browserLocalPersistence, same-origin storage) the next time it's opened — no repeat
    // sign-in needed inside the standalone shell itself.
    function isStandalone() {
      return window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
    }

    if (isStandalone()) {
      signinBtn.classList.add("hidden");
      standaloneNote.classList.remove("hidden");
      safariLink.classList.remove("hidden");
      safariLink.classList.add("flex");
      safariLink.href = location.href;
    }

    // Guards against onAuthStateChanged redirecting away mid-click, which would tear down
    // the page (and cancel the in-flight login_logs write below) before it can complete.
    let signingIn = false;

    function getRedirectTarget() {
      const raw = new URLSearchParams(location.search).get("redirect");
      return raw && /^[a-zA-Z0-9_-]+\.html$/.test(raw) ? raw : "index.html";
    }

    // OWNER (jjun8647@gmail.com) > approved FRIEND (an entry in `friends/{email}`) > VIEWER
    // (signed in, public content only). Cached in localStorage for cheap UI gating elsewhere —
    // firestore.rules re-checks `friends` fresh on every read/write, this is display-only.
    async function resolveUserMode(user) {
      if (isOwner(user)) return "OWNER";
      try {
        const friendSnap = await getDoc(doc(db, "friends", user.email.toLowerCase()));
        if (friendSnap.exists()) return "FRIEND";
      } catch (err) {
        console.error("[login] friends lookup failed:", err);
      }
      return "VIEWER";
    }

    // Lightweight directory doc so other signed-in users can find this account to view its
    // public content (see dashboard.js's "Search People"). `role` is public (readable by any
    // signed-in user, unlike `friends` which is owner-only) so Search People can pre-filter
    // results by role without needing to read the whitelist itself. `merge: true` is required
    // here — without it this write would blow away a `username`/`bio`/`location` set later
    // from Settings on the next login. `createdAt` is only included on the very first write
    // (checked via a read first) so the public "joined" date on profile.html stays stable
    // across every later session-restore instead of resetting on each login.
    async function upsertUserProfile(user, mode) {
      const userRef = doc(db, "users", user.uid);
      let isNewUser = true;
      try {
        const existing = await getDoc(userRef);
        isNewUser = !existing.exists();
      } catch (err) {
        console.error("[login] users profile existence check failed:", err);
      }
      try {
        await setDoc(userRef, {
          uid: user.uid,
          email: user.email,
          displayName: user.displayName || "",
          photoURL: user.photoURL || "",
          role: mode.toLowerCase(),
          ...(isNewUser ? { createdAt: serverTimestamp() } : {}),
        }, { merge: true });
      } catch (err) {
        console.error("[login] users profile upsert failed:", err);
      }
    }

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        if (signingIn) return;
        // Session restore (not a fresh interactive sign-in): just refresh the cached role
        // in case whitelist status changed since last time, no logging.
        const mode = await resolveUserMode(user);
        localStorage.setItem(USER_MODE_KEY, mode);
        await upsertUserProfile(user, mode);
        location.href = getRedirectTarget();
        return;
      }
      document.body.classList.remove("auth-check-pending");
    });

    signinBtn.addEventListener("click", async () => {
      statusEl.textContent = "";
      signingIn = true;
      let user;
      try {
        ({ user } = await signInWithPopup(auth, googleProvider));
      } catch (err) {
        signingIn = false;
        console.error("[login] sign-in failed:", err);
        statusEl.textContent = "Sign-in failed — please try again.";
        return;
      }

      const mode = await resolveUserMode(user);
      localStorage.setItem(USER_MODE_KEY, mode);
      await upsertUserProfile(user, mode);

      // Best-effort: don't let a login_logs write failure (e.g. firestore.rules not yet
      // pasted into the Firebase Console) block an otherwise-successful sign-in.
      try {
        await addDoc(collection(db, "login_logs"), {
          uid: user.uid,
          email: user.email,
          loginTime: serverTimestamp(),
          device: navigator.userAgent,
          page: "login",
        });
      } catch (err) {
        console.error("[login] login_logs write failed (continuing anyway):", err);
      }

      // Notifications are per-user now (everyone has their own space) — not owner-only.
      try {
        await addDoc(collection(db, "notifications"), {
          uid: user.uid,
          type: "login",
          title: "New login detected",
          message: `New login detected from ${shortDevice(navigator.userAgent)}.`,
          read: false,
          createdAt: serverTimestamp(),
        });
      } catch (err) {
        console.error("[login] notification write failed (continuing anyway):", err);
      }

      location.href = getRedirectTarget();
    });
  </script>
</body>
</html>
