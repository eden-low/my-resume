<!DOCTYPE html>
<html lang="en">
<head>
  <script>(function(){try{var s=JSON.parse(localStorage.getItem('lfj:settings')||'{}');if(s.theme==='light')document.documentElement.setAttribute('data-theme','light');}catch(e){}})();</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In | EdenAtlas</title>
  <link rel="stylesheet" href="tailwind.generated.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#09090e">
  <link rel="apple-touch-icon" href="images/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="images/icon-192.png">
</head>
<body class="auth-check-pending bg-darkBg text-white font-sans login-bg min-h-screen flex flex-col">
  <!-- Almost-invisible atlas/orbit/grid texture — decorative only, never a cyberpunk grid. -->
  <div class="pointer-events-none fixed inset-0 overflow-hidden" aria-hidden="true">
    <div class="absolute inset-0 login-dot-grid"></div>
    <div class="login-orbit-ring" style="width:560px;height:560px;"></div>
    <div class="login-orbit-ring" style="width:840px;height:840px;"></div>
    <div class="login-orbit-ring" style="width:1120px;height:1120px;"></div>
  </div>

  <main class="relative flex-1 flex items-center justify-center px-4 py-16">
    <div id="login-card" class="w-full max-w-sm reveal bg-cardBg/90 backdrop-blur-md neon-border-purple rounded-2xl px-8 py-10 md:px-10 md:py-12 text-center transition-opacity duration-300">
      <div class="w-16 h-16 mx-auto flex items-center justify-center">
        <img src="images/logo-mark.png" alt="EdenAtlas" class="w-full h-full object-contain">
      </div>
      <h1 class="font-cyber font-semibold text-2xl mt-6 text-transparent bg-clip-text bg-gradient-to-r from-white to-neonPurple">EdenAtlas</h1>
      <p class="text-textGray text-sm mt-3" data-i18n="login.tagline">Your life, beautifully organized.</p>

      <button id="signin-btn" class="mt-9 w-full px-6 py-3.5 bg-gradient-to-r from-neonViolet to-neonPurple rounded-full text-sm font-semibold tracking-wide text-white hover:scale-[1.02] active:scale-[0.99] transition-transform duration-200 flex items-center justify-center gap-3">
        <i class="fa-brands fa-google"></i> <span data-i18n="login.continue_google">Continue with Google</span>
      </button>
      <p id="signin-status" class="mt-4 text-xs font-code text-textGray"></p>

      <p class="mt-7 text-[11px] text-textGray/70 leading-relaxed" data-i18n="login.privacy">Your data stays private — only you decide what to share.</p>

      <a href="index.html" class="mt-4 inline-flex items-center gap-1.5 text-[11px] text-textGray/60 hover:text-neonPurple transition-colors">
        <i class="fa-solid fa-arrow-left text-[10px]"></i> <span data-i18n="login.back_to_portfolio">Back to Portfolio</span>
      </a>
    </div>

    <!-- Post-sign-in transition: card fades out, a small EA-logo loading state fades in, then
         we navigate — so the jump to Home never feels like a sudden page-load pop. -->
    <div id="login-loading" class="hidden absolute inset-0 flex items-center justify-center">
      <div id="login-loading-inner" class="flex flex-col items-center gap-4 opacity-0 transition-opacity duration-500">
        <div class="w-14 h-14 animate-pulse">
          <img src="images/logo-mark.png" alt="" class="w-full h-full object-contain">
        </div>
        <p class="text-[11px] font-code text-textGray tracking-widest">Loading…</p>
      </div>
    </div>
  </main>

  <script type="module" src="js/splash.js"></script>
  <script type="module" src="js/i18n.js"></script>
  <footer class="relative pb-8 text-center">
    <p class="text-xs font-semibold text-white/80">EdenAtlas</p>
    <p class="text-[11px] text-textGray/70 mt-1" data-i18n="login.footer_line">Built by Jun &middot; Version 3.2</p>
  </footer>

  <script src="scripts.js" defer></script>
  <script type="module">
    import { auth, googleProvider, db, isOwner, USER_MODE_KEY } from "./firebase-init.js";
    import {
      onAuthStateChanged, signInWithPopup, signInWithRedirect, getRedirectResult,
    } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import { addDoc, collection, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const signinBtn = document.getElementById("signin-btn");
    const statusEl = document.getElementById("signin-status");
    const loginCard = document.getElementById("login-card");
    const loginLoading = document.getElementById("login-loading");
    const loginLoadingInner = document.getElementById("login-loading-inner");

    function shortDevice(ua) {
      if (!ua) return "an unknown device";
      if (/iPhone|iPad/.test(ua)) return "iOS";
      if (/Android/.test(ua)) return "Android";
      if (/Windows/.test(ua)) return "Windows";
      if (/Macintosh/.test(ua)) return "macOS";
      if (/Linux/.test(ua)) return "Linux";
      return "an unknown device";
    }

    // Small, deliberate transition instead of an abrupt navigation: fade the card out, fade a
    // centered EA mark in, then hand off to the target page — which itself fades in via the
    // existing auth-check-pending -> body opacity transition, so the whole hop reads as one
    // continuous motion rather than a page-load jump.
    function transitionToApp(target) {
      loginCard.classList.add("opacity-0");
      loginLoading.classList.remove("hidden");
      requestAnimationFrame(() => loginLoadingInner.classList.remove("opacity-0"));
      setTimeout(() => { location.href = target; }, 450);
    }

    // A standalone/installed iPhone PWA uses a storage partition that doesn't reliably survive
    // a round trip through a different top-level origin (that's the actual root cause of the
    // old "stranded on Google's page" failure — not something specific to popup vs. redirect).
    // Rather than route around it via a real Safari tab and hope the installed app happens to
    // share Safari's storage (it doesn't, reliably, on iOS — see firebase-init.js's authDomain
    // comment for the fix that removes this whole assumption), sign-in now works from inside
    // the PWA itself: a normal browser tab uses signInWithPopup as before, while a standalone
    // launch uses signInWithRedirect against a same-origin-proxied authDomain, which keeps the
    // whole OAuth handshake on this site's own origin end to end.
    function isStandalone() {
      return window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
    }

    // Guards against onAuthStateChanged racing an in-flight interactive sign-in (popup or a
    // just-returned redirect), which would otherwise double-run the login-logging/notification
    // writes below or navigate away mid-write. Reset per page load; a signInWithRedirect
    // round trip is a fresh page load, so this doesn't need to persist across that hop — the
    // redirectCheckPromise below is what identifies "this session load IS the sign-in".
    let signingIn = false;

    // getRedirectResult resolves with the just-completed sign-in exactly once, on the page load
    // immediately following signInWithRedirect's round trip — null on every other load (a plain
    // session restore, or no pending redirect at all). Always safe to call. Caught here (never
    // left to reject inside onAuthStateChanged) so a transient failure surfaces as a normal
    // "try again" message instead of leaving the page stuck on auth-check-pending.
    const redirectCheckPromise = getRedirectResult(auth).catch((err) => {
      console.error("[login] redirect sign-in failed:", err);
      statusEl.textContent = "Sign-in failed — please try again.";
      return null;
    });

    // Same-site, repository-relative allowlist only — a bare filename matching this exact set,
    // never a path with a slash/colon/protocol (blocks `//evil.example`, `https://...`,
    // encoded external URLs, etc. by construction, since none of those can match one of these
    // literal strings). `index.html`/`portfolio.html`/`login.html` are deliberately excluded:
    // the first two are the public Portfolio (never a "private destination" to return to after
    // signing in) and the third would be a redirect-to-self loop.
    const KNOWN_PRIVATE_PAGES = new Set([
      "home.html", "resume.html", "gallery.html", "atlas.html", "journal.html", "expenses.html",
      "calendar.html", "dashboard.html", "reports.html", "notifications.html", "timeline.html",
      "habits.html", "time-capsule.html", "constellation.html", "contact.html", "collections.html",
      "collection-detail.html", "me.html", "settings.html", "profile.html",
    ]);
    function getRedirectTarget() {
      const raw = new URLSearchParams(location.search).get("redirect");
      return raw && KNOWN_PRIVATE_PAGES.has(raw) ? raw : "home.html";
    }

    // OWNER (jjun8647@gmail.com) > approved FRIEND (an entry in `friends/{email}`) > VIEWER
    // (signed in, public content only). Cached in localStorage for cheap UI gating elsewhere —
    // firestore.rules re-checks `friends` fresh on every read/write, this is display-only.
    async function resolveUserMode(user) {
      if (isOwner(user)) return "OWNER";
      try {
        const friendSnap = await getDoc(doc(db, "friends", user.email.toLowerCase()));
        if (friendSnap.exists()) return "FRIEND";
      } catch (err) {
        console.error("[login] friends lookup failed:", err);
      }
      return "VIEWER";
    }

    // Lightweight directory doc so other signed-in users can find this account to view its
    // public content (see dashboard.js's "Search People"). `role` is public (readable by any
    // signed-in user, unlike `friends` which is owner-only) so Search People can pre-filter
    // results by role without needing to read the whitelist itself. `merge: true` is required
    // here — without it this write would blow away a `username`/`bio`/`location` set later
    // from Settings on the next login. `createdAt` and `displayName` are only included on the
    // very first write (checked via a read first): `createdAt` so the public "joined" date on
    // profile.html stays stable across every later session-restore, and `displayName` (v3.1) so
    // a Display Name the user later cleans up from Me -> Profile (e.g. Google's raw "君JUN")
    // never gets clobbered back to the raw Google name on the next login.
    async function upsertUserProfile(user, mode) {
      const userRef = doc(db, "users", user.uid);
      let isNewUser = true;
      try {
        const existing = await getDoc(userRef);
        isNewUser = !existing.exists();
      } catch (err) {
        console.error("[login] users profile existence check failed:", err);
      }
      try {
        await setDoc(userRef, {
          uid: user.uid,
          email: user.email,
          photoURL: user.photoURL || "",
          role: mode.toLowerCase(),
          ...(isNewUser ? { displayName: user.displayName || "", createdAt: serverTimestamp() } : {}),
        }, { merge: true });
      } catch (err) {
        console.error("[login] users profile upsert failed:", err);
      }
      // v3.2.2: a world-readable mirror (no `email`) so an unauthenticated HR visitor on
      // resume.html?u=... can resolve who they're looking at without reading the auth-required
      // users/{uid} doc — see firestore.rules' public_profiles match block. `username` and
      // `careerVisibility` are intentionally omitted here; they're merged in separately by
      // whichever flow owns them (me.js's username save, career.js's Resume Visibility control).
      try {
        await setDoc(doc(db, "public_profiles", user.uid), {
          uid: user.uid,
          photoURL: user.photoURL || "",
          role: mode.toLowerCase(),
          ...(isNewUser ? { displayName: user.displayName || "" } : {}),
        }, { merge: true });
      } catch (err) {
        console.error("[login] public_profiles upsert failed:", err);
      }
    }

    // Shared by both interactive sign-in paths (popup's immediate resolution, and redirect's
    // resolution one page load later via getRedirectResult) — same role-resolve, profile-upsert,
    // login_logs, and notification writes either way, so a redirect sign-in on iOS logs and
    // notifies exactly like a popup sign-in always has.
    async function completeFreshSignIn(user) {
      const mode = await resolveUserMode(user);
      localStorage.setItem(USER_MODE_KEY, mode);
      await upsertUserProfile(user, mode);

      // Best-effort: don't let a login_logs write failure (e.g. firestore.rules not yet
      // pasted into the Firebase Console) block an otherwise-successful sign-in.
      try {
        await addDoc(collection(db, "login_logs"), {
          uid: user.uid,
          email: user.email,
          loginTime: serverTimestamp(),
          device: navigator.userAgent,
          page: "login",
        });
      } catch (err) {
        console.error("[login] login_logs write failed (continuing anyway):", err);
      }

      // Notifications are per-user now (everyone has their own space) — not owner-only.
      try {
        await addDoc(collection(db, "notifications"), {
          uid: user.uid,
          type: "login",
          title: "New login detected",
          message: `New login detected from ${shortDevice(navigator.userAgent)}.`,
          read: false,
          createdAt: serverTimestamp(),
        });
      } catch (err) {
        console.error("[login] notification write failed (continuing anyway):", err);
      }

      transitionToApp(getRedirectTarget());
    }

    onAuthStateChanged(auth, async (user) => {
      const redirectResult = await redirectCheckPromise;
      if (user) {
        if (signingIn) return;
        if (redirectResult && redirectResult.user && redirectResult.user.uid === user.uid) {
          // This page load IS a standalone-PWA redirect sign-in completing — treat it as a
          // fresh interactive sign-in (log + notify), not a silent session restore.
          signingIn = true;
          await completeFreshSignIn(user);
          return;
        }
        // Session restore (not a fresh interactive sign-in): just refresh the cached role
        // in case whitelist status changed since last time, no logging.
        const mode = await resolveUserMode(user);
        localStorage.setItem(USER_MODE_KEY, mode);
        await upsertUserProfile(user, mode);
        transitionToApp(getRedirectTarget());
        return;
      }
      document.body.classList.remove("auth-check-pending");
    });

    signinBtn.addEventListener("click", async () => {
      statusEl.textContent = "";

      if (isStandalone()) {
        // Navigates away immediately; this page instance ends here. The rest of the sign-in
        // (role resolve, profile upsert, logging, notification) happens on the next load, once
        // the browser returns from Google and getRedirectResult picks up the result above.
        try {
          await signInWithRedirect(auth, googleProvider);
        } catch (err) {
          console.error("[login] redirect initiation failed:", err);
          statusEl.textContent = "Sign-in failed — please try again.";
        }
        return;
      }

      signingIn = true;
      let user;
      try {
        ({ user } = await signInWithPopup(auth, googleProvider));
      } catch (err) {
        signingIn = false;
        console.error("[login] sign-in failed:", err);
        statusEl.textContent = "Sign-in failed — please try again.";
        return;
      }

      await completeFreshSignIn(user);
    });
  </script>
</body>
</html>
