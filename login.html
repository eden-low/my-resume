<!DOCTYPE html>
<html lang="en">
<head>
  <script>(function(){try{var s=JSON.parse(localStorage.getItem('lfj:settings')||'{}');if(s.theme==='light')document.documentElement.setAttribute('data-theme','light');}catch(e){}})();</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In | Low Fang Jun</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#17151f">
  <link rel="apple-touch-icon" href="images/me3.jpeg">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            darkBg: '#0a0a0e',
            cardBg: '#17151f',
            borderNeon: '#2a2833',
            neonPurple: '#a78bfa',
            neonBlue: '#6ea8fe',
            neonViolet: '#8b7cf0',
            textGray: '#9793ab',
          },
          fontFamily: {
            cyber: ['-apple-system', 'BlinkMacSystemFont', '"SF Pro Display"', '"Segoe UI"', 'sans-serif'],
            code: ['ui-monospace', '"SF Mono"', 'Menlo', 'Consolas', '"Fira Code"', 'monospace'],
            sans: ['-apple-system', 'BlinkMacSystemFont', '"SF Pro Text"', '"Segoe UI"', 'Roboto', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>
<body class="auth-check-pending bg-darkBg text-white font-sans grid-bg min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-sm reveal bg-cardBg/90 backdrop-blur-md neon-border-purple rounded-2xl p-8 text-center">
    <div class="w-14 h-14 mx-auto rounded-xl bg-gradient-to-tr from-neonViolet to-neonPurple flex items-center justify-center shadow-lg shadow-neonPurple/20">
      <i class="fa-solid fa-shield-halved text-white text-xl"></i>
    </div>
    <h1 class="font-cyber font-semibold text-xl mt-5 text-transparent bg-clip-text bg-gradient-to-r from-white to-neonPurple">LOW FANG JUN</h1>
    <p class="text-[10px] text-neonPurple font-code font-bold tracking-widest mt-1">SYSTEM PROFILE</p>
    <p class="text-textGray text-sm mt-5">Sign in with Google to continue.</p>

    <button id="signin-btn" class="mt-6 w-full px-5 py-3 bg-gradient-to-r from-neonViolet to-neonPurple rounded-xl text-sm font-cyber font-bold tracking-wider text-white hover:scale-[1.02] transition-all flex items-center justify-center gap-2">
      <i class="fa-brands fa-google"></i> SIGN IN WITH GOOGLE
    </button>
    <p id="signin-status" class="mt-4 text-xs font-code text-textGray"></p>
  </div>

  <script src="scripts.js" defer></script>
  <script type="module">
    import { auth, googleProvider, db } from "./firebase-init.js";
    import { onAuthStateChanged, signInWithPopup } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import { addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const signinBtn = document.getElementById("signin-btn");
    const statusEl = document.getElementById("signin-status");

    function getRedirectTarget() {
      const raw = new URLSearchParams(location.search).get("redirect");
      return raw && /^[a-zA-Z0-9_-]+\.html$/.test(raw) ? raw : "index.html";
    }

    onAuthStateChanged(auth, (user) => {
      if (user) {
        location.href = getRedirectTarget();
        return;
      }
      document.body.classList.remove("auth-check-pending");
    });

    signinBtn.addEventListener("click", async () => {
      statusEl.textContent = "";
      let user;
      try {
        ({ user } = await signInWithPopup(auth, googleProvider));
      } catch (err) {
        console.error("[login] sign-in failed:", err);
        statusEl.textContent = "Sign-in failed — please try again.";
        return;
      }

      // Best-effort: don't let a login_logs write failure (e.g. firestore.rules not yet
      // pasted into the Firebase Console) block an otherwise-successful sign-in.
      try {
        await addDoc(collection(db, "login_logs"), {
          uid: user.uid,
          email: user.email,
          loginTime: serverTimestamp(),
          device: navigator.userAgent,
          page: "login",
        });
      } catch (err) {
        console.error("[login] login_logs write failed (continuing anyway):", err);
      }

      location.href = getRedirectTarget();
    });
  </script>
</body>
</html>
