# Netlify configuration for EdenAtlas — a static, buildless, multi-page site.
#
# --- History: why this isn't `publish = "."` anymore ---
# The first version of this file published the repo root directly and relied on per-file
# `[[redirects]]` 404-shadow rules to block non-product files (firestore.rules, CLAUDE.md,
# tmp_*.ts, migrate-career.html, etc). Live testing after deploy found several of those
# redirects did not reliably block the file they targeted, and separately — a real structural
# gap, not a redirect-reliability issue — `publish = "."` also served the Netlify Functions
# *source* directory itself as static files at `/netlify/functions/health.js`, a path
# completely different from the real, separately-routed Function endpoint at
# `/.netlify/functions/health`.
#
# The fix is structural: `publish` now points at `site/`, a directory generated by
# `scripts/build-site.js` — a small, dependency-free Node script that copies an explicit
# ALLOWLIST of product files/directories (see that file's ALLOW_FILES/ALLOW_DIRS) into `site/`,
# preserving every relative path exactly (styles.css/scripts.js/js/*/locales/*/images/* stay
# siblings, so no page's relative references change). Anything not on the allowlist — internal
# docs, Firebase/Netlify config, rules source, the Functions source tree, stray tracked files —
# is simply never copied, so there is nothing at that path to serve, regardless of how Netlify's
# redirect engine behaves. This is Netlify's own documented `[build] command` + `publish`
# pattern, not a new build framework: no bundler, no transpilation, no new dependency.
#
# `functions = "netlify/functions"` is unaffected by this change — Netlify reads Function
# source from the repo root independently of `publish`, so `/.netlify/functions/health` (and
# any future function) keeps working with zero code changes. See the completion report for the
# full before/after verification (files present/absent in `site/`, HTTP status checks).
#
# No SPA rewrite: every page is its own real .html file (home.html, login.html, resume.html,
# project.html, atlas.html, etc.) reachable at its exact path. A catch-all
# `/* -> /index.html 200` rewrite would silently serve the public Portfolio for every
# unmatched/typo'd URL and break that direct-access model, so none is configured here —
# unmatched paths fall through to Netlify's own 404.

[build]
  command = "node scripts/build-site.js"
  publish = "site"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# --- Baseline security headers for the whole site ---
# Additive only: does not change caching behaviour for any page (service-worker.js already
# owns the app-shell caching strategy client-side) and does not touch Firebase/Google Sign-In,
# which this site depends on (an overly strict frame-ancestors/CSP here has broken Google
# Identity popups on other projects, so no CSP is introduced in this pass).
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Function responses (this includes the future Qwen Atlas Assistant endpoint, not just health):
# never cached by a shared/browser cache — an AI answer or a live status check must always be
# treated as fresh, never replayed from a CDN/browser cache. `/.netlify/functions/*` is the
# real, Netlify-routed Function invocation path — distinct from the (now unpublished) static
# source directory `netlify/functions/` blocked structurally above.
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Cache-Control = "no-store"
